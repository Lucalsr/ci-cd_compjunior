# render.yaml
databases:
  - name: nasalinha-db
    databaseName: nasalinha_db
    user: nasalinha
    plan: free # O banco free expira após 90 dias no Render

services:
  # Backend API
  - type: web
    name: nasalinha-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    # REMOVIDO: Seção de disk (não suportada no Free)
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nasalinha-db
          property: connectionString
      - key: PORT
        value: "5001"
      # Como não há persistência de disco, se você usa o /app/uploads,
      # os arquivos serão apagados a cada novo deploy ou reinicialização.

  # Frontend React
  - type: web
    name: nasalinha-frontend
    env: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://nasalinha-backend.onrender.com/api
