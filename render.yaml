# render.yaml
databases:
  - name: nasalinha-db
    databaseName: nasalinha_db
    user: nasalinha
    plan: free 

services:
 
  - type: web
    name: nasalinha-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nasalinha-db
          property: connectionString
      - key: PORT
        value: "5001"
  
  - type: web
    name: nasalinha-frontend
    env: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://nasalinha-backend.onrender.com/api
